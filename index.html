<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Websites</title>

<style>
body { font-family: Arial; margin:0; }
.page { display:none; padding:30px; }
.active { display:block; }

.card {
  border:2px solid gold;
  padding:20px;
  margin:20px;
  cursor:pointer;
}
.btn {
  background:gold;
  padding:10px;
  display:inline-block;
  text-decoration:none;
  color:black;
  font-weight:bold;
}
</style>

<script>
function show(id){
  document.querySelectorAll('.page').forEach(p => p.style.display="none");
  document.getElementById(id).style.display="block";
}
window.onload = () => show('home');
</script>

</head>

<body>

<!-- HOME -->
<div id="home" class="page">
  <h1>Websites</h1>

  <div class="card" onclick="show('mooihorloge')">
    Mooihorloge
  </div>

  <div class="card" onclick="show('succesmetads')">
    Succesmetads
  </div>

  <div class="card" onclick="show('marktplaats')">
    Marktplaats
  </div>
</div>

<!-- MOOIHORLOGE -->
<div id="mooihorloge" class="page">
  <h1>Mooihorloge</h1>
  <a class="btn" href="https://mooihorloge.nl" target="_blank">Ga naar site</a>
  <br><br>
  <button onclick="show('home')">Terug</button>
</div>

<!-- SUCCESMETADS -->
<div id="succesmetads" class="page">
  <h1>Succesmetads</h1>
  <a class="btn" href="https://succesmetads.nl" target="_blank">Ga naar site</a>
  <br><br>
  <button onclick="show('home')">Terug</button>
</div>

<!-- MARKTPLAATS -->
<div id="marktplaats" class="page">
  <h1>Marktplaats</h1>
  <a class="btn" href="https://www.marktplaats.nl/u/bas/12777793/" target="_blank">Profiel</a>
  <br><br>
  <button onclick="show('home')">Terug</button>
</div>

</body>
</html>
