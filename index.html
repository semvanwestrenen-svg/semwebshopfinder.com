<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sem Webshop Finder</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

header {
    background: #ff6600;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
}

.card a {
    display: block;
    margin: 10px;
    padding: 10px;
    background: #ff6600;
    color: white;
    text-align: center;
    border-radius: 8px;
    text-decoration: none;
}

.card a:hover {
    background: #e65c00;
}
</style>
</head>

<body>

<header> Sem Webshop Finder</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/300x150?text=Bol.com">
        <h3>Bol.com</h3>
        <a href="https://www.bol.com" target="_blank">Ga naar site</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150?text=Amazon">
        <h3>Amazon</h3>
        <a href="https://www.amazon.nl" target="_blank">Ga naar site</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150?text=Coolblue">
        <h3>Coolblue</h3>
        <a href="https://www.coolblue.nl" target="_blank">Ga naar site</a>
    </div>

</div>

</body>
</html>
